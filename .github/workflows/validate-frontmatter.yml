name: Validate Frontmatter

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Explicit read-only — no write permissions needed

    steps:
      - name: Checkout repository
        # Pinned to v6.0.2 commit SHA — avoids mutable tag risk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        # Pinned to v2.2.0 commit SHA — avoids mutable tag risk
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.13"  # Pinned version — avoids pulling unknown future releases

      - name: Install dependencies
        # Pin yaml to an exact version and skip lifecycle scripts
        run: bun add --exact --ignore-scripts yaml@2.8.3

      - name: Run frontmatter validation
        run: bun .github/scripts/validate-frontmatter.ts
