name: Check Version Bump

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version bumps
        run: |
          # Get list of changed version files in the PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }} | grep -E '(.claude-plugin/marketplace.json|plugins/[^/]+/\.claude-plugin/plugin\.json)' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No version files modified."
            exit 0
          fi
          
          for FILE in $CHANGED_FILES; do
            if [ ! -f "$FILE" ]; then
              echo "$FILE was deleted, skipping."
              continue
            fi
            
            # Extract current version
            HEAD_VERSION=$(jq -r '.version' "$FILE")
            
            # Extract base version from target branch (default to 0.0.0 if new file)
            BASE_VERSION=$(git show origin/${{ github.base_ref }}:"$FILE" 2>/dev/null | jq -r '.version' 2>/dev/null || echo "0.0.0")
            
            echo "Checking $FILE: Base ($BASE_VERSION) -> Head ($HEAD_VERSION)"
            
            if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
              echo "❌ Error: Version in $FILE was modified but the version string was not bumped (still $BASE_VERSION)."
              exit 1
            fi
            
            # Compare using semantic version sort
            LOWEST=$(printf '%s\n' "$BASE_VERSION" "$HEAD_VERSION" | sort -V | head -n1)
            
            if [ "$LOWEST" = "$HEAD_VERSION" ]; then
              echo "❌ Error: Version in $FILE was downgraded from $BASE_VERSION to $HEAD_VERSION."
              exit 1
            fi
            
            echo "✅ Version bump successfully detected for $FILE."
          done
